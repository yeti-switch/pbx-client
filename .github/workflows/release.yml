name: Release

on:
  push:
    tags: ['v*'] # e.g. v0.0.1 — the build version is taken from the tag (see below)

permissions:
  contents: write # needed to create/upload the GitHub Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Version comes from the tag (strip leading "v"), NOT package.json — so the
      # release/artifacts are named after the tag (e.g. v0.0.1 → 0.0.1).
      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (no scripts)
        run: npm ci --ignore-scripts --no-fund --no-audit --loglevel=error

      # Stamp the tag version into package.json so app.getVersion() and the
      # artifact/release names all match the tag (cross-platform, no fragile CLI args).
      - name: Set version from tag
        shell: bash
        run: npm pkg set version="${{ steps.ver.outputs.version }}"

      # --ignore-scripts skipped these; packaging needs them, so run explicitly:
      - name: Fetch Electron binary
        run: node node_modules/electron/install.js

      - name: Rebuild native app deps
        run: npx electron-builder install-app-deps

      - name: Build & publish (Linux — AppImage + deb, snap dropped in CI)
        if: matrix.platform == 'linux'
        run: npx electron-vite build && npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (Windows — NSIS)
        if: matrix.platform == 'win'
        run: npx electron-vite build && npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
