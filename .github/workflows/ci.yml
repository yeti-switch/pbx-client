name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Per project policy: install without running lifecycle scripts.
      # The lint/typecheck/test/bundle steps don't need the Electron binary,
      # so we don't fetch it here (that's only needed for packaging — see release.yml).
      - name: Install
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Bundle (electron-vite build)
        run: npx electron-vite build
